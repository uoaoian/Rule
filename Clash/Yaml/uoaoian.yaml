# mihomo 配置
# 日期：2026年5月日
# 适用版本：所有使用 mihomo 核心的程序
port: 7890
socks-port: 7891
mixed-port: 7892
redir-port: 7893
tproxy-port: 7894

unified-delay: true
geodata-mode: false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome

allow-lan: true
mode: rule
log-level: info
ipv6: true
udp: true

external-controller: 0.0.0.0:9090
# external-ui: ui
# external-ui-url: 'https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip'

geox-url:
  # geoip: 'https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geoip.dat'
  # geosite: 'https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geosite.dat'
  mmdb: 'https://geodata.kelee.one/Country-Masaiki.mmdb'
  asn: 'https://geodata.kelee.one/GeoLite2-ASN-P3TERX.mmdb'

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com

  skip-domain:
    - Mijia Cloud

tun:
  enable: true
  stack: system
  dns-hijack:
    - any:53
  auto-route: true
  auto-detect-interface: true

# P2P下载端口
listeners:
- name: socks5-in-1
  type: socks
  port: 10808
  listen: 0.0.0.0
  udp: true
  users: []
  proxy: DIRECT

dns:
  enable: true
  prefer-h3: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter:
    - "*"
    - +.lan
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6
  nameserver:
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query

# 锚点 - 节点订阅的参数 [每小时更新一次订阅节点，每 6 秒一次健康检查]
NodeParam: &NodeParam {type: http, interval: 3600, health-check: {enable: true, url: 'http://www.google.com/blank.html', interval: 6}}

# 锚点 - 节点订阅
proxy-providers: 
  Enet:
    url: '*****'
    <<: *NodeParam
    path: './proxy_providers/Enet.yaml'
    override:
      additional-prefix: "[Enet] " # 为订阅节点添加机场名称前缀

# 锚点 - 节点筛选组
FilterHK: &FilterHK '^(?=.*((?i)🇭🇰|香港|(\b(HK|Hong)\b))).*$'
FilterTW: &FilterTW '(?i)(🇹🇼|台湾|tw|taiwan)'
FilterJP: &FilterJP '^(?=.*((?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|(\b(JP|Japan)\b))).*$'
FilterKR: &FilterKR '^(?=.*((?i)🇰🇷|韩国|韓|首尔|(\b(KR|Korea)\b))).*$'
FilterSG: &FilterSG '^(?=.*((?i)🇸🇬|新加坡|狮|(\b(SG|Singapore)\b))).*$'
FilterUS: &FilterUS '^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|(\b(US|United States)\b))).*$'
FilterUK: &FilterUK '^(?=.*((?i)🇬🇧|英国|伦敦|(\b(UK|United Kingdom)\b))).*$'
FilterFR: &FilterFR '^(?=.*((?i)🇫🇷|法国|(\b(FR|France)\b))).*$'
FilterDE: &FilterDE '^(?=.*((?i)🇩🇪|德国|(\b(DE|Germany)\b))).*$'
Other: &Other '(?i)^(?!.*(🇭🇰|🇹🇼|🇯🇵|🇰🇷|🇸🇬|🇺🇸|港|澳门|hk|台|tw|日|jp|韩|kr|新|sg|美|us|hong|taiwan|japan|korea|singapore|america)).*$'
FilterGame: &FilterGame '^(?=.*((?i)游戏|🎮|(\b(GAME)\b)))(?!.*((?i)回国|校园)).*$'
FilterAll: &FilterAll '^(?=.*(.))(?!.*((?i)群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|(\b(USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author)\b|(\d{4}-\d{2}-\d{2}|\d+G)))).*$'

# 节点组参数锚点
# 锚点 - 时延优选参数 [每 6 秒一次惰性健康检查，容差 20ms，时延超过 2 秒判定为失败，失败 3 次则自动触发健康检查]
UrlTest: &UrlTest {type: url-test, interval: 6, tolerance: 20, lazy: true, url: 'http://www.google.com/blank.html', disable-udp: false, timeout: 2000, max-failed-times: 3, hidden: false, include-all-providers: true}
# 锚点 - 故障转移参数 [每 6 秒一次惰性健康检查，时延超过 2 秒判定为失败，失败 3 次则自动触发健康检查]
FallBack: &FallBack {type: fallback, interval: 6, lazy: true, url: 'http://www.google.com/blank.html', disable-udp: false, timeout: 2000, max-failed-times: 3, hidden: true, include-all-providers: true}
# 锚点 - 负载均衡参数 [每 6 秒一次惰性健康检查，时延超过 2 秒判定为失败，失败 3 次则自动触发健康检查]
LoadBalance: &LoadBalance {type: load-balance, interval: 6, lazy: true, url: 'http://www.google.com/blank.html', disable-udp: false, strategy: consistent-hashing, timeout: 2000, max-failed-times: 3, hidden: true, include-all-providers: true}
# 锚点 - 规则参数 [每天更新一次订阅规则，更新规则时使用Proxy策略]
RuleSet: &RuleSet {type: http, behavior: classical, interval: 86400, format: yaml, proxy: DIRECT}

# 策略组
proxy-groups: 
  - {name: AI, type: url-test, include-all-providers: true, filter: '^(?=.*(美国|新加坡|美|🇺🇸)).*(家宽|IPLC).*', url: http://www.gstatic.com/generate_204, interval: 300}
  - {name: Apple, type: select,proxies: [自动节点, Plus节点, Base节点, Standard节点, 湾区节点, 台湾节点, 日本节点, 韩国节点, 新加坡节点, 美国节点, 其它节点]}
  - {name: Emby, type: fallback, proxies: [自动节点, Plus节点, Base节点, Standard节点, 湾区节点, 台湾节点, 日本节点, 韩国节点, 新加坡节点, 美国节点, 其它节点]}
  - {name: Telegram, type: select, proxies: [自动节点, Plus节点, Base节点, Standard节点, 湾区节点, 台湾节点, 日本节点, 韩国节点, 新加坡节点, 美国节点, 其它节点]}
  - {name: Netflix, type: select, proxies: [自动节点, Plus节点, Base节点, Standard节点, 湾区节点, 台湾节点, 日本节点, 韩国节点, 新加坡节点, 美国节点, 其它节点]}
  - {name: Disney+, type: select,proxies: [自动节点, Plus节点, Base节点, Standard节点, 湾区节点, 台湾节点, 日本节点, 韩国节点, 新加坡节点, 美国节点, 其它节点]}
  - {name: YouTube, type: select, proxies: [自动节点, Plus节点, Base节点, Standard节点, 湾区节点, 台湾节点, 日本节点, 韩国节点, 新加坡节点, 美国节点, 其它节点]}
  - {name: TikTok, type: select, proxies: [自动节点, Plus节点, Base节点, Standard节点, 湾区节点, 台湾节点, 日本节点, 韩国节点, 新加坡节点, 美国节点, 其它节点]}
  - {name: Spotify, type: select, proxies: [自动节点, Plus节点, Base节点, Standard节点, 湾区节点, 台湾节点, 日本节点, 韩国节点, 新加坡节点, 美国节点, 其它节点]}
  - {name: Gamer, type: select, include-all: true, filter: *FilterGame, proxies: [DIRECT, Proxy]}
  - {name: Microsoft, type: select, proxies: [自动节点, Plus节点, Base节点, Standard节点, 湾区节点, 台湾节点, 日本节点, 韩国节点, 新加坡节点, 美国节点, 其它节点]}
  - {name: GlobalMedia, type: select, proxies: [自动节点, Plus节点, Base节点, Standard节点, 湾区节点, 台湾节点, 日本节点, 韩国节点, 新加坡节点, 美国节点, 其它节点]}
  - {name: Proxy, type: select, proxies: [自动节点, Plus节点, Base节点, Standard节点, 湾区节点, 台湾节点, 日本节点, 韩国节点, 新加坡节点, 美国节点, 其它节点]}

 
  - {name: 自动节点, <<: *UrlTest, filter: *FilterAll}
  - {name: 湾区节点, <<: *UrlTest, filter: *FilterHK}
  - {name: 台湾节点, <<: *UrlTest, filter: *FilterTW}
  - {name: 日本节点, <<: *UrlTest, filter: *FilterJP}
  - {name: 韩国节点, <<: *UrlTest, filter: *FilterKR}
  - {name: 新加坡节点, <<: *UrlTest, filter: *FilterSG}
  - {name: 美国节点, <<: *UrlTest, filter: *FilterUS}
  - {name: 其它节点, <<: *UrlTest, filter: *Other}

  - { name: Plus节点, <<: *UrlTest, filter: '(?i)^(?=.*\bPlus\b)(?!.*\bBase\b).*$' }
  - { name: Base节点, <<: *UrlTest, filter: '(?i)^(?=.*\bBase\b)(?!.*\bPlus\b).*$' }
  - { name: Standard节点, <<: *UrlTest, filter: '(?i)^(?!.*(\bBase\b|\bPlus\b)).*$' }

