mixed-port: 7890
allow-lan: true
mode: rule
log-level: info

# ================= DNS =================
dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip

# ================= Rule Providers =================
rule-providers:

  AI1:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/uoaoian/ios_rule_script/refs/heads/master/rule/Clash/OpenAI/OpenAI.list
    path: ./rules/ai1.yaml
    interval: 86400

  AI2:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/OpenAI/OpenAI.list
    path: ./rules/ai2.yaml
    interval: 86400

  Apple:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Apple/Apple.list
    path: ./rules/apple.yaml
    interval: 86400

  Emby:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Emby/Emby.list
    path: ./rules/emby.yaml
    interval: 86400

  GitHub:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.list
    path: ./rules/github.yaml
    interval: 86400

  Google:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list
    path: ./rules/google.yaml
    interval: 86400

  Microsoft:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Microsoft/Microsoft.list
    path: ./rules/microsoft.yaml
    interval: 86400

  Telegram:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Telegram/Telegram.list
    path: ./rules/tg.yaml
    interval: 86400

  Netflix:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Netflix/Netflix.list
    path: ./rules/netflix.yaml
    interval: 86400

  Streaming:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/GlobalMedia/GlobalMedia.list
    path: ./rules/stream.yaml
    interval: 86400

  Proxy:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Proxy/Proxy.list
    path: ./rules/proxy.yaml
    interval: 86400

  ChinaMax:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/ChinaMax/ChinaMax.list
    path: ./rules/china.yaml
    interval: 86400

# ================= Proxy Groups =================
proxy-groups:

  - name: 节点选择
    type: select
    proxies: [自动选择, 故障转移, 负载均衡, 手动切换, DIRECT]

  - name: 自动选择
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 故障转移
    type: fallback
    include-all: true
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 负载均衡
    type: load-balance
    include-all: true
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 手动切换
    type: select
    include-all: true

  # ===== 功能组 =====
  - name: AI
    type: select
    proxies: [节点选择, 自动选择, 手动切换]

  - name: Apple
    type: select
    proxies: [节点选择, 自动选择]

  - name: Emby
    type: select
    proxies: [DIRECT, 节点选择]

  - name: GitHub
    type: select
    proxies: [节点选择, 自动选择]

  - name: Google
    type: select
    proxies: [节点选择, 自动选择]

  - name: Microsoft
    type: select
    proxies: [节点选择, 自动选择]

  - name: Telegram
    type: select
    proxies: [节点选择, 自动选择]

  - name: Netflix
    type: select
    proxies: [节点选择, 自动选择]

  - name: Streaming
    type: select
    proxies: [节点选择, 自动选择]

  - name: Resolve
    type: select
    proxies: [节点选择, 自动选择]

# ================= Rules =================
rules:

  # LAN
  - GEOIP,LAN,DIRECT

  # CN
  - GEOIP,CN,DIRECT

  # AI
  - RULE-SET,AI1,AI
  - RULE-SET,AI2,AI

  - RULE-SET,Apple,Apple
  - RULE-SET,Emby,Emby
  - RULE-SET,GitHub,GitHub
  - RULE-SET,Google,Google
  - RULE-SET,Microsoft,Microsoft
  - RULE-SET,Telegram,Telegram
  - RULE-SET,Netflix,Netflix
  - RULE-SET,Streaming,Streaming

  # 代理兜底
  - RULE-SET,Proxy,Resolve

  # 中国直连
  - RULE-SET,ChinaMax,DIRECT

  # 最终规则
  - MATCH,节点选择
